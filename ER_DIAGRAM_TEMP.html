<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeLink - Entity Relationship Diagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
            padding: 40px;
            overflow-x: auto;
        }

        .container {
            background: white;
            border: 2px solid #333;
            padding: 40px;
            min-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #000;
            margin-bottom: 40px;
            font-size: 2em;
            font-weight: bold;
        }

        svg {
            display: block;
            margin: 0 auto;
        }

        /* Entity rectangles */
        .entity-rect {
            fill: white;
            stroke: #000;
            stroke-width: 2;
        }

        /* Relationship diamonds */
        .relationship-diamond {
            fill: white;
            stroke: #000;
            stroke-width: 2;
        }

        /* Connecting lines */
        .connection-line {
            stroke: #000;
            stroke-width: 2;
            fill: none;
        }

        /* Text styles */
        .entity-name {
            font-size: 16px;
            font-weight: bold;
            text-anchor: middle;
            fill: #000;
        }

        .attribute-text {
            font-size: 12px;
            fill: #000;
        }

        .pk-text {
            font-size: 12px;
            fill: #000;
            text-decoration: underline;
            font-weight: bold;
        }

        .fk-text {
            font-size: 12px;
            fill: #000;
            font-style: italic;
        }

        .relationship-text {
            font-size: 14px;
            font-weight: bold;
            text-anchor: middle;
            fill: #000;
        }

        .cardinality-text {
            font-size: 13px;
            font-weight: bold;
            fill: #000;
        }

        .legend-box {
            fill: white;
            stroke: #000;
            stroke-width: 1;
        }

        .legend-text {
            font-size: 12px;
            fill: #000;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>LifeLink - Entity Relationship Diagram</h1>

        <svg width="1500" height="1400" xmlns="http://www.w3.org/2000/svg">
            <!-- DONORS Entity (Top Left) -->
            <g id="donors">
                <rect class="entity-rect" x="50" y="50" width="200" height="400" />
                <text class="entity-name" x="150" y="75">DONORS</text>
                <line x1="50" y1="85" x2="250" y2="85" stroke="#000" stroke-width="2" />

                <text class="pk-text" x="60" y="105">id (PK)</text>
                <text class="attribute-text" x="60" y="125">name</text>
                <text class="attribute-text" x="60" y="145">age</text>
                <text class="attribute-text" x="60" y="165">gender</text>
                <text class="attribute-text" x="60" y="185">fatherName</text>
                <text class="attribute-text" x="60" y="205">mobile</text>
                <text class="attribute-text" x="60" y="225">email</text>
                <text class="attribute-text" x="60" y="245">state</text>
                <text class="attribute-text" x="60" y="265">district</text>
                <text class="attribute-text" x="60" y="285">address</text>
                <text class="attribute-text" x="60" y="305">pincode</text>
                <text class="attribute-text" x="60" y="325">latitude</text>
                <text class="attribute-text" x="60" y="345">longitude</text>
                <text class="attribute-text" x="60" y="365">bloodGroup</text>
                <text class="attribute-text" x="60" y="385">password</text>
                <text class="attribute-text" x="60" y="405">isActive</text>
                <text class="attribute-text" x="60" y="425">status</text>
            </g>

            <!-- BLOOD_REQUESTS Entity (Top Center) -->
            <g id="blood-requests">
                <rect class="entity-rect" x="400" y="50" width="220" height="340" />
                <text class="entity-name" x="510" y="75">BLOOD_REQUESTS</text>
                <line x1="400" y1="85" x2="620" y2="85" stroke="#000" stroke-width="2" />

                <text class="pk-text" x="410" y="105">id (PK)</text>
                <text class="attribute-text" x="410" y="125">requesterName</text>
                <text class="attribute-text" x="410" y="145">patientName</text>
                <text class="attribute-text" x="410" y="165">hospitalName</text>
                <text class="attribute-text" x="410" y="185">mobile</text>
                <text class="attribute-text" x="410" y="205">bloodGroup</text>
                <text class="attribute-text" x="410" y="225">state</text>
                <text class="attribute-text" x="410" y="245">city</text>
                <text class="attribute-text" x="410" y="265">area</text>
                <text class="attribute-text" x="410" y="285">pincode</text>
                <text class="attribute-text" x="410" y="305">latitude</text>
                <text class="attribute-text" x="410" y="325">longitude</text>
                <text class="attribute-text" x="410" y="345">isEmergency</text>
                <text class="attribute-text" x="410" y="365">status</text>
                <text class="fk-text" x="410" y="385">donorId (FK)</text>
            </g>

            <!-- BLOOD_CENTERS Entity (Top Right) -->
            <g id="blood-centers">
                <rect class="entity-rect" x="800" y="50" width="200" height="320" />
                <text class="entity-name" x="900" y="75">BLOOD_CENTERS</text>
                <line x1="800" y1="85" x2="1000" y2="85" stroke="#000" stroke-width="2" />

                <text class="pk-text" x="810" y="105">id (PK)</text>
                <text class="attribute-text" x="810" y="125">name</text>
                <text class="attribute-text" x="810" y="145">type</text>
                <text class="attribute-text" x="810" y="165">state</text>
                <text class="attribute-text" x="810" y="185">district</text>
                <text class="attribute-text" x="810" y="205">city</text>
                <text class="attribute-text" x="810" y="225">address</text>
                <text class="attribute-text" x="810" y="245">pincode</text>
                <text class="attribute-text" x="810" y="265">latitude</text>
                <text class="attribute-text" x="810" y="285">longitude</text>
                <text class="attribute-text" x="810" y="305">contactNumber</text>
                <text class="attribute-text" x="810" y="325">email</text>
                <text class="attribute-text" x="810" y="345">username</text>
                <text class="attribute-text" x="810" y="365">isActive</text>
            </g>

            <!-- BLOOD_STOCKS Entity (Bottom Right) -->
            <g id="blood-stocks">
                <rect class="entity-rect" x="800" y="550" width="220" height="180" />
                <text class="entity-name" x="910" y="575">BLOOD_STOCKS</text>
                <line x1="800" y1="585" x2="1020" y2="585" stroke="#000" stroke-width="2" />

                <text class="pk-text" x="810" y="605">id (PK)</text>
                <text class="fk-text" x="810" y="625">bloodCenterId (FK)</text>
                <text class="attribute-text" x="810" y="645">bloodGroup</text>
                <text class="attribute-text" x="810" y="665">bloodComponent</text>
                <text class="attribute-text" x="810" y="685">unitsAvailable</text>
                <text class="attribute-text" x="810" y="705">expiryDate</text>
            </g>

            <!-- CAMPS Entity (Bottom Left) -->
            <g id="camps">
                <rect class="entity-rect" x="50" y="550" width="200" height="410" />
                <text class="entity-name" x="150" y="575">CAMPS</text>
                <line x1="50" y1="585" x2="250" y2="585" stroke="#000" stroke-width="2" />

                <text class="pk-text" x="60" y="605">id (PK)</text>
