<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeLink - Entity Relationship Diagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #f5f5f5;
            padding: 40px;
            overflow-x: auto;
        }

        .container {
            background: white;
            border: 2px solid #333;
            padding: 40px;
            min-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #000;
            margin-bottom: 40px;
            font-size: 2em;
            font-weight: bold;
        }

        svg {
            display: block;
            margin: 0 auto;
        }

        /* Entity rectangles */
        .entity-rect {
            fill: white;
            stroke: #000;
            stroke-width: 2;
        }

        /* Relationship diamonds */
        .relationship-diamond {
            fill: white;
            stroke: #000;
            stroke-width: 2;
        }

        /* Connecting lines */
        .connection-line {
            stroke: #000;
            stroke-width: 2;
            fill: none;
        }

        /* Text styles */
        .entity-name {
            font-size: 16px;
            font-weight: bold;
            text-anchor: middle;
            fill: #000;
        }

        .attribute-text {
            font-size: 12px;
            fill: #000;
        }

        .pk-text {
            font-size: 12px;
            fill: #000;
            text-decoration: underline;
            font-weight: bold;
        }

        .fk-text {
            font-size: 12px;
            fill: #000;
            font-style: italic;
        }

        .relationship-text {
            font-size: 14px;
            font-weight: bold;
            text-anchor: middle;
            fill: #000;
        }

        .cardinality-text {
            font-size: 13px;
            font-weight: bold;
            fill: #000;
        }

        .legend-box {
            fill: white;
            stroke: #000;
            stroke-width: 1;
        }

        .legend-text {
            font-size: 12px;
            fill: #000;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>LifeLink - Entity Relationship Diagram</h1>

        <svg width="1500" height="1400" xmlns="http://www.w3.org/2000/svg">
            <!-- DONORS Entity (Top Left) -->
            <g id="donors">
                <rect class="entity-rect" x="50" y="50" width="200" height="400" />
                <text class="entity-name" x="150" y="75">DONORS</text>
                <line x1="50" y1="85" x2="250" y2="85" stroke="#000" stroke-width="2" />

                <text class="pk-text" x="60" y="105">id (PK)</text>
                <text class="attribute-text" x="60" y="125">name</text>
                <text class="attribute-text" x="60" y="145">age</text>
                <text class="attribute-text" x="60" y="165">gender</text>
                <text class="attribute-text" x="60" y="185">fatherName</text>
                <text class="attribute-text" x="60" y="205">mobile</text>
                <text class="attribute-text" x="60" y="225">email</text>
                <text class="attribute-text" x="60" y="245">state</text>
                <text class="attribute-text" x="60" y="265">district</text>
                <text class="attribute-text" x="60" y="285">address</text>
                <text class="attribute-text" x="60" y="305">pincode</text>
                <text class="attribute-text" x="60" y="325">latitude</text>
                <text class="attribute-text" x="60" y="345">longitude</text>
                <text class="attribute-text" x="60" y="365">bloodGroup</text>
                <text class="attribute-text" x="60" y="385">password</text>
                <text class="attribute-text" x="60" y="405">isActive</text>
                <text class="attribute-text" x="60" y="425">status</text>
            </g>

            <!-- BLOOD_REQUESTS Entity (Top Center) -->
            <g id="blood-requests">
                <rect class="entity-rect" x="400" y="50" width="220" height="340" />
                <text class="entity-name" x="510" y="75">BLOOD_REQUESTS</text>
                <line x1="400" y1="85" x2="620" y2="85" stroke="#000" stroke-width="2" />

                <text class="pk-text" x="410" y="105">id (PK)</text>
                <text class="attribute-text" x="410" y="125">requesterName</text>
                <text class="attribute-text" x="410" y="145">patientName</text>
                <text class="attribute-text" x="410" y="165">hospitalName</text>
                <text class="attribute-text" x="410" y="185">mobile</text>
                <text class="attribute-text" x="410" y="205">bloodGroup</text>
                <text class="attribute-text" x="410" y="225">state</text>
                <text class="attribute-text" x="410" y="245">city</text>
                <text class="attribute-text" x="410" y="265">area</text>
                <text class="attribute-text" x="410" y="285">pincode</text>
                <text class="attribute-text" x="410" y="305">latitude</text>
                <text class="attribute-text" x="410" y="325">longitude</text>
                <text class="attribute-text" x="410" y="345">isEmergency</text>
                <text class="attribute-text" x="410" y="365">status</text>
                <text class="fk-text" x="410" y="385">donorId (FK)</text>
            </g>

            <!-- BLOOD_CENTERS Entity (Top Right) -->
            <g id="blood-centers">
                <rect class="entity-rect" x="800" y="50" width="200" height="320" />
                <text class="entity-name" x="900" y="75">BLOOD_CENTERS</text>
                <line x1="800" y1="85" x2="1000" y2="85" stroke="#000" stroke-width="2" />

                <text class="pk-text" x="810" y="105">id (PK)</text>
                <text class="attribute-text" x="810" y="125">name</text>
                <text class="attribute-text" x="810" y="145">type</text>
                <text class="attribute-text" x="810" y="165">state</text>
                <text class="attribute-text" x="810" y="185">district</text>
                <text class="attribute-text" x="810" y="205">city</text>
                <text class="attribute-text" x="810" y="225">address</text>
                <text class="attribute-text" x="810" y="245">pincode</text>
                <text class="attribute-text" x="810" y="265">latitude</text>
                <text class="attribute-text" x="810" y="285">longitude</text>
                <text class="attribute-text" x="810" y="305">contactNumber</text>
                <text class="attribute-text" x="810" y="325">email</text>
                <text class="attribute-text" x="810" y="345">username</text>
                <text class="attribute-text" x="810" y="365">isActive</text>
            </g>

            <!-- BLOOD_STOCKS Entity (Bottom Right) -->
            <g id="blood-stocks">
                <rect class="entity-rect" x="800" y="550" width="220" height="180" />
                <text class="entity-name" x="910" y="575">BLOOD_STOCKS</text>
                <line x1="800" y1="585" x2="1020" y2="585" stroke="#000" stroke-width="2" />

                <text class="pk-text" x="810" y="605">id (PK)</text>
                <text class="fk-text" x="810" y="625">bloodCenterId (FK)</text>
                <text class="attribute-text" x="810" y="645">bloodGroup</text>
                <text class="attribute-text" x="810" y="665">bloodComponent</text>
                <text class="attribute-text" x="810" y="685">unitsAvailable</text>
                <text class="attribute-text" x="810" y="705">expiryDate</text>
            </g>

            <!-- CAMPS Entity (Bottom Left) - WITH SPACING GAPS -->
            <g id="camps">
                <rect class="entity-rect" x="50" y="550" width="200" height="420" />
                <text class="entity-name" x="150" y="575">CAMPS</text>
                <line x1="50" y1="585" x2="250" y2="585" stroke="#000" stroke-width="2" />

                <text class="pk-text" x="60" y="610">id (PK)</text>

                <!-- Organizer Information Group -->
                <text class="attribute-text" x="60" y="640">organizationType</text>
                <text class="attribute-text" x="60" y="662">organizationName</text>
                <text class="attribute-text" x="60" y="684">organizer</text>
                <text class="attribute-text" x="60" y="706">organizerMobile</text>
                <text class="attribute-text" x="60" y="728">organizerEmail</text>

                <!-- Camp Details Group -->
                <text class="attribute-text" x="60" y="758">campName</text>
                <text class="attribute-text" x="60" y="780">campAddress</text>
                <text class="attribute-text" x="60" y="802">state</text>
                <text class="attribute-text" x="60" y="824">district</text>
                <text class="attribute-text" x="60" y="846">cityName</text>

                <!-- Schedule Group -->
                <text class="attribute-text" x="60" y="876">campDate</text>
                <text class="attribute-text" x="60" y="898">startTime</text>
                <text class="attribute-text" x="60" y="920">endTime</text>
                <text class="attribute-text" x="60" y="942">status</text>
            </g>

            <!-- REQUEST_DONORS Entity (Center Bottom) -->
            <g id="request-donors">
                <rect class="entity-rect" x="400" y="700" width="220" height="140" />
                <text class="entity-name" x="510" y="725">REQUEST_DONORS</text>
                <line x1="400" y1="735" x2="620" y2="735" stroke="#000" stroke-width="2" />

                <text class="pk-text" x="410" y="755">id (PK)</text>
                <text class="fk-text" x="410" y="775">requestId (FK)</text>
                <text class="fk-text" x="410" y="795">donorId (FK)</text>
                <text class="attribute-text" x="410" y="815">status</text>
            </g>

            <!-- Relationship 1: DONORS makes/receives BLOOD_REQUESTS -->
            <g id="rel-1">
                <!-- Diamond -->
                <polygon class="relationship-diamond" points="310,220 350,250 310,280 270,250" />
                <text class="relationship-text" x="310" y="255">makes</text>

                <!-- Line from DONORS to diamond -->
                <line class="connection-line" x1="250" y1="250" x2="270" y2="250" />
                <text class="cardinality-text" x="255" y="245">1</text>

                <!-- Line from diamond to BLOOD_REQUESTS -->
                <line class="connection-line" x1="350" y1="250" x2="400" y2="250" />
                <text class="cardinality-text" x="370" y="245">N</text>
            </g>

            <!-- Relationship 2: BLOOD_CENTERS has BLOOD_STOCKS -->
            <g id="rel-2">
                <!-- Diamond -->
                <polygon class="relationship-diamond" points="900,450 940,480 900,510 860,480" />
                <text class="relationship-text" x="900" y="485">has</text>

                <!-- Line from BLOOD_CENTERS to diamond -->
                <line class="connection-line" x1="900" y1="370" x2="900" y2="450" />
                <text class="cardinality-text" x="905" y="410">1</text>

                <!-- Line from diamond to BLOOD_STOCKS -->
                <line class="connection-line" x1="900" y1="510" x2="900" y2="550" />
                <text class="cardinality-text" x="905" y="535">N</text>
            </g>

            <!-- Relationship 3: DONORS responds_to REQUEST_DONORS -->
            <g id="rel-3">
                <!-- Diamond -->
                <polygon class="relationship-diamond" points="150,500 190,530 150,560 110,530" />
                <text class="relationship-text" x="150" y="535">responds</text>

                <!-- Line from DONORS to diamond -->
                <line class="connection-line" x1="150" y1="450" x2="150" y2="500" />
                <text class="cardinality-text" x="155" y="475">1</text>

                <!-- Line from diamond to REQUEST_DONORS -->
                <line class="connection-line" x1="190" y1="530" x2="300" y2="650" />
                <line class="connection-line" x1="300" y1="650" x2="400" y2="750" />
                <text class="cardinality-text" x="305" y="645">N</text>
            </g>

            <!-- Relationship 4: BLOOD_REQUESTS notifies REQUEST_DONORS -->
            <g id="rel-4">
                <!-- Diamond -->
                <polygon class="relationship-diamond" points="510,480 550,510 510,540 470,510" />
                <text class="relationship-text" x="510" y="515">notifies</text>

                <!-- Line from BLOOD_REQUESTS to diamond -->
                <line class="connection-line" x1="510" y1="390" x2="510" y2="480" />
                <text class="cardinality-text" x="515" y="435">1</text>

                <!-- Line from diamond to REQUEST_DONORS -->
                <line class="connection-line" x1="510" y1="540" x2="510" y2="700" />
                <text class="cardinality-text" x="515" y="620">N</text>
            </g>

            <!-- Legend -->
            <g id="legend">
                <rect class="legend-box" x="1100" y="50" width="350" height="200" />
                <text class="entity-name" x="1275" y="75">LEGEND</text>
                <line x1="1100" y1="85" x2="1450" y2="85" stroke="#000" stroke-width="2" />

                <!-- Rectangle symbol -->
                <rect class="entity-rect" x="1120" y="100" width="60" height="30" />
                <text class="legend-text" x="1190" y="120">= Entity (Table)</text>

                <!-- Diamond symbol -->
                <polygon class="relationship-diamond" points="1150,155 1170,170 1150,185 1130,170" />
                <text class="legend-text" x="1190" y="175">= Relationship</text>

                <!-- Primary Key -->
                <text class="pk-text" x="1120" y="215">Underlined</text>
                <text class="legend-text" x="1190" y="215">= Primary Key (PK)</text>

                <!-- Foreign Key -->
                <text class="fk-text" x="1120" y="235">Italic</text>
                <text class="legend-text" x="1190" y="235">= Foreign Key (FK)</text>
            </g>

            <!-- Cardinality Legend -->
            <g id="cardinality-legend">
                <rect class="legend-box" x="1100" y="280" width="350" height="120" />
                <text class="entity-name" x="1275" y="305">CARDINALITY</text>
                <line x1="1100" y1="315" x2="1450" y2="315" stroke="#000" stroke-width="2" />

                <text class="legend-text" x="1120" y="340">1 = One (Exactly one)</text>
                <text class="legend-text" x="1120" y="360">N = Many (Zero or more)</text>
                <text class="legend-text" x="1120" y="380">1:N = One-to-Many relationship</text>
            </g>

            <!-- Relationships Summary -->
            <g id="relationships-summary">
                <rect class="legend-box" x="1100" y="430" width="350" height="200" />
                <text class="entity-name" x="1275" y="455">RELATIONSHIPS</text>
                <line x1="1100" y1="465" x2="1450" y2="465" stroke="#000" stroke-width="2" />

                <text class="legend-text" x="1120" y="490">1. DONORS → BLOOD_REQUESTS</text>
                <text class="legend-text" x="1130" y="510" style="font-size: 11px;">(1:N - One donor, many
                    requests)</text>

                <text class="legend-text" x="1120" y="535">2. BLOOD_CENTERS → BLOOD_STOCKS</text>
                <text class="legend-text" x="1130" y="555" style="font-size: 11px;">(1:N - One center, many
                    stocks)</text>

                <text class="legend-text" x="1120" y="580">3. DONORS ↔ REQUEST_DONORS</text>
                <text class="legend-text" x="1130" y="600" style="font-size: 11px;">(1:N - Junction table for
                    N:M)</text>

                <text class="legend-text" x="1120" y="620">4. BLOOD_REQUESTS ↔ REQUEST_DONORS</text>
            </g>
        </svg>
    </div>
</body>

</html>
