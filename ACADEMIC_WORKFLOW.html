<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeLink - Academic System Workflow</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', serif;
            /* Academic style font */
            background: #ffffff;
            padding: 20px;
            overflow-x: auto;
        }

        .container {
            background: white;
            padding: 20px;
            min-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #000;
            margin-bottom: 10px;
            font-size: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .subtitle {
            text-align: center;
            color: #444;
            margin-bottom: 30px;
            font-size: 16px;
            font-style: italic;
        }

        svg {
            display: block;
            margin: 0 auto;
            border: 1px solid #ccc;
        }

        /* Swimlane Headers */
        .swimlane-header {
            fill: #f0f0f0;
            stroke: #000;
            stroke-width: 1;
        }

        .swimlane-title {
            font-size: 16px;
            font-weight: bold;
            fill: #333;
            text-anchor: middle;
            font-family: 'Arial', sans-serif;
        }

        /* Swimlane Backgrounds */
        .swimlane-bg {
            fill: none;
            stroke: #ddd;
            stroke-width: 1;
            stroke-dasharray: 5, 5;
        }

        /* Nodes */
        .start-end {
            fill: #000;
            stroke: none;
        }

        .process {
            fill: #ffffff;
            stroke: #000;
            stroke-width: 1.5;
        }

        .decision {
            fill: #ffffff;
            stroke: #000;
            stroke-width: 1.5;
        }

        .data {
            fill: #ffffff;
            stroke: #000;
            stroke-width: 1.5;
        }

        /* Text */
        .node-text {
            font-size: 12px;
            fill: #000;
            text-anchor: middle;
            font-family: 'Arial', sans-serif;
        }

        .node-text-bold {
            font-size: 12px;
            font-weight: bold;
            fill: #000;
            text-anchor: middle;
            font-family: 'Arial', sans-serif;
        }

        /* Connectors */
        .connector {
            stroke: #000;
            stroke-width: 1.5;
            fill: none;
            marker-end: url(#arrow);
        }

        .label {
            font-size: 11px;
            fill: #000;
            background-color: white;
            font-family: 'Arial', sans-serif;
        }

        /* Legend */
        .legend-box {
            fill: none;
            stroke: #000;
            stroke-width: 1;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>LifeLink System Architecture & Workflow</h1>
        <p class="subtitle">Cross-Functional Activity Diagram (Swimlane Model)</p>

        <svg width="1600" height="1800" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                    <path d="M0,0 L0,6 L9,3 z" fill="#000" />
                </marker>
            </defs>

            <!-- SWIMLANES -->
            <!-- 1. User (Donor/Requester) -->
            <rect x="50" y="50" width="350" height="1650" class="swimlane-bg" />
            <rect x="50" y="50" width="350" height="40" class="swimlane-header" />
            <text x="225" y="75" class="swimlane-title">USER (Donor / Requester)</text>

            <!-- 2. Blood Center / Camp -->
            <rect x="400" y="50" width="350" height="1650" class="swimlane-bg" />
            <rect x="400" y="50" width="350" height="40" class="swimlane-header" />
            <text x="575" y="75" class="swimlane-title">BLOOD CENTER / CAMP</text>

            <!-- 3. LifeLink System (Logic) -->
            <rect x="750" y="50" width="450" height="1650" class="swimlane-bg" />
            <rect x="750" y="50" width="450" height="40" class="swimlane-header" />
            <text x="975" y="75" class="swimlane-title">SYSTEM LOGIC & DATABASE</text>

            <!-- 4. Administrator -->
            <rect x="1200" y="50" width="350" height="1650" class="swimlane-bg" />
            <rect x="1200" y="50" width="350" height="40" class="swimlane-header" />
            <text x="1375" y="75" class="swimlane-title">ADMINISTRATOR</text>


            <!-- PHASE 1: REGISTRATION & ONBOARDING -->
            <text x="800" y="120" font-weight="bold" font-size="14" fill="#666">PHASE 1: ONBOARDING</text>

            <!-- Start Node -->
            <circle cx="225" cy="140" r="10" class="start-end" />

            <!-- User Register -->
            <rect x="150" y="180" width="150" height="50" rx="5" class="process" />
            <text x="225" y="205" class="node-text-bold">Registration</text>
            <text x="225" y="220" class="node-text">Form Submission</text>

            <line x1="225" y1="150" x2="225" y2="180" class="connector" />

            <!-- System Validation -->
            <rect x="875" y="180" width="200" height="50" rx="5" class="process" />
            <text x="975" y="205" class="node-text-bold">Data Validation</text>
            <text x="975" y="220" class="node-text">Schema & Constraints</text>

            <line x1="300" y1="205" x2="875" y2="205" class="connector" />

            <!-- DB Store Pending -->
            <path d="M875,260 L1075,260 L1055,300 L855,300 Z" class="data" />
            <text x="965" y="285" class="node-text">Store User (Pending)</text>

            <line x1="975" y1="230" x2="975" y2="260" class="connector" />

            <!-- Admin Review -->
            <rect x="1275" y="260" width="200" height="50" rx="5" class="process" />
            <text x="1375" y="285" class="node-text-bold">Review Application</text>
            <text x="1375" y="300" class="node-text">Verify Documents/Details</text>

            <line x1="1075" y1="285" x2="1275" y2="285" class="connector" />

            <!-- Decision: Approve? -->
            <polygon points="1375,340 1425,370 1375,400 1325,370" class="decision" />
            <text x="1375" y="375" class="node-text">Approve?</text>

            <line x1="1375" y1="310" x2="1375" y2="340" class="connector" />

            <!-- Yes -> Activate -->
            <rect x="875" y="345" width="200" height="50" rx="5" class="process" />
            <text x="975" y="370" class="node-text-bold">Activate Account</text>
            <text x="975" y="385" class="node-text">Generate JWT Token</text>

            <line x1="1325" y1="370" x2="1075" y2="370" class="connector" />
            <text x="1200" y="365" class="label">YES</text>

            <!-- No -> Reject -->
            <rect x="1275" y="430" width="200" height="40" rx="5" class="process" />
            <text x="1375" y="455" class="node-text">Mark Rejected</text>

            <line x1="1375" y1="400" x2="1375" y2="430" class="connector" />
            <text x="1380" y="415" class="label">NO</text>

            <!-- Notify User -->
            <rect x="875" y="430" width="200" height="40" rx="5" class="process" />
            <text x="975" y="455" class="node-text">Send Notification</text>

            <line x1="975" y1="395" x2="975" y2="430" class="connector" />
            <line x1="1275" y1="450" x2="1075" y2="450" class="connector" />


            <!-- PHASE 2: INVENTORY & CAMPS -->
            <line x1="50" y1="500" x2="1550" y2="500" stroke="#ccc" stroke-dasharray="5,5" />
            <text x="800" y="520" font-weight="bold" font-size="14" fill="#666">PHASE 2: INVENTORY & CAMPS</text>

            <!-- Blood Center Update Stock -->
            <rect x="475" y="550" width="200" height="50" rx="5" class="process" />
            <text x="575" y="575" class="node-text-bold">Update Inventory</text>
            <text x="575" y="590" class="node-text">Add/Remove Units</text>

            <!-- System Update DB -->
            <path d="M875,550 L1075,550 L1055,590 L855,590 Z" class="data" />
            <text x="965" y="575" class="node-text">Update BLOOD_STOCKS</text>

            <line x1="675" y1="575" x2="855" y2="575" class="connector" />

            <!-- Camp Organizer Create Camp -->
            <rect x="475" y="630" width="200" height="50" rx="5" class="process" />
            <text x="575" y="655" class="node-text-bold">Organize Camp</text>
            <text x="575" y="670" class="node-text">Submit Camp Details</text>

            <!-- System Geo-Tag -->
            <rect x="875" y="630" width="200" height="50" rx="5" class="process" />
            <text x="975" y="655" class="node-text-bold">Geo-Tagging</text>
            <text x="975" y="670" class="node-text">Process Lat/Long</text>

            <line x1="675" y1="655" x2="875" y2="655" class="connector" />

            <!-- Admin Approve Camp -->
            <rect x="1275" y="630" width="200" height="50" rx="5" class="process" />
            <text x="1375" y="655" class="node-text-bold">Approve Camp</text>

            <line x1="1075" y1="655" x2="1275" y2="655" class="connector" />

            <!-- Publish Camp -->
            <rect x="875" y="710" width="200" height="50" rx="5" class="process" />
            <text x="975" y="735" class="node-text-bold">Publish Event</text>
            <text x="975" y="750" class="node-text">Make Visible to Users</text>

            <line x1="1375" y1="680" x2="1375" y2="735" class="connector" />
            <line x1="1375" y1="735" x2="1075" y2="735" class="connector" />


            <!-- PHASE 3: EMERGENCY REQUEST & MATCHING -->
            <line x1="50" y1="800" x2="1550" y2="800" stroke="#ccc" stroke-dasharray="5,5" />
            <text x="800" y="820" font-weight="bold" font-size="14" fill="#666">PHASE 3: EMERGENCY RESPONSE</text>

            <!-- User Request -->
            <rect x="150" y="850" width="150" height="50" rx="5" class="process" />
            <text x="225" y="875" class="node-text-bold">Emergency Request</text>
            <text x="225" y="890" class="node-text">Blood Group, Location</text>

            <!-- System Algorithm -->
            <rect x="850" y="850" width="250" height="60" rx="5" class="process" style="stroke-width: 2;" />
            <text x="975" y="875" class="node-text-bold">Matching Algorithm</text>
            <text x="975" y="895" class="node-text">PostGIS (Distance) + Compatibility</text>

            <line x1="300" y1="875" x2="850" y2="875" class="connector" />

            <!-- DB Query -->
            <path d="M875,940 L1075,940 L1055,980 L855,980 Z" class="data" />
            <text x="965" y="965" class="node-text">Fetch Eligible Donors</text>

            <line x1="975" y1="910" x2="975" y2="940" class="connector" />

            <!-- Notification Service -->
            <rect x="875" y="1010" width="200" height="50" rx="5" class="process" />
            <text x="975" y="1035" class="node-text-bold">Notification Service</text>
            <text x="975" y="1050" class="node-text">Twilio API (SMS)</text>

            <line x1="975" y1="980" x2="975" y2="1010" class="connector" />

            <!-- Donor Receive -->
            <rect x="150" y="1010" width="150" height="50" rx="5" class="process" />
            <text x="225" y="1035" class="node-text-bold">Receive Alert</text>
            <text x="225" y="1050" class="node-text">SMS / App Notification</text>

            <line x1="875" y1="1035" x2="300" y2="1035" class="connector" />

            <!-- Donor Accept -->
            <polygon points="225,1090 275,1120 225,1150 175,1120" class="decision" />
            <text x="225" y="1125" class="node-text">Accept?</text>

            <line x1="225" y1="1060" x2="225" y2="1090" class="connector" />

            <!-- Update Request Status -->
            <rect x="875" y="1100" width="200" height="50" rx="5" class="process" />
            <text x="975" y="1125" class="node-text-bold">Update Status</text>
            <text x="975" y="1140" class="node-text">Mark 'In Progress'</text>

            <line x1="275" y1="1120" x2="875" y2="1120" class="connector" />
            <text x="400" y="1115" class="label">YES</text>


            <!-- PHASE 4: FULFILLMENT & FEEDBACK -->
            <line x1="50" y1="1200" x2="1550" y2="1200" stroke="#ccc" stroke-dasharray="5,5" />
            <text x="800" y="1220" font-weight="bold" font-size="14" fill="#666">PHASE 4: FULFILLMENT</text>

            <!-- Donation Occurs -->
            <rect x="475" y="1250" width="200" height="50" rx="5" class="process" />
            <text x="575" y="1275" class="node-text-bold">Donation Process</text>
            <text x="575" y="1290" class="node-text">Verify Donor & Collect</text>

            <line x1="975" y1="1150" x2="975" y2="1275" class="connector" />
            <line x1="975" y1="1275" x2="675" y2="1275" class="connector" />

            <!-- Admin Close Request -->
            <rect x="1275" y="1250" width="200" height="50" rx="5" class="process" />
            <text x="1375" y="1275" class="node-text-bold">Close Request</text>
            <text x="1375" y="1290" class="node-text">Mark Completed</text>

            <line x1="675" y1="1275" x2="1275" y2="1275" class="connector" />

            <!-- Update Donor History -->
            <path d="M875,1330 L1075,1330 L1055,1370 L855,1370 Z" class="data" />
            <text x="965" y="1355" class="node-text">Update Donor History</text>

            <line x1="1375" y1="1300" x2="1375" y2="1350" class="connector" />
            <line x1="1375" y1="1350" x2="1075" y2="1350" class="connector" />

            <!-- Auto-Deactivate -->
            <rect x="875" y="1400" width="200" height="50" rx="5" class="process" />
            <text x="975" y="1425" class="node-text-bold">Deactivate Donor</text>
            <text x="975" y="1440" class="node-text">Set Cooling Period</text>

            <line x1="965" y1="1370" x2="965" y2="1400" class="connector" />

            <!-- End Node -->
            <circle cx="975" cy="1500" r="10" class="start-end" />
            <line x1="975" y1="1450" x2="975" y2="1490" class="connector" />


            <!-- LEGEND -->
            <rect x="50" y="1600" width="1500" height="100" class="legend-box" />
            <text x="800" y="1625" font-weight="bold" text-anchor="middle">LEGEND</text>

            <circle cx="100" cy="1650" r="8" class="start-end" />
            <text x="120" y="1655" font-size="12">Start/End</text>

            <rect x="200" y="1640" width="80" height="25" rx="3" class="process" />
            <text x="300" y="1655" font-size="12">Process</text>

            <polygon points="400,1640 420,1652 400,1665 380,1652" class="decision" />
            <text x="440" y="1655" font-size="12">Decision</text>

            <path d="M550,1640 L600,1640 L590,1665 L540,1665 Z" class="data" />
            <text x="620" y="1655" font-size="12">Data I/O</text>

            <line x1="750" y1="1652" x2="800" y2="1652" class="connector" />
            <text x="820" y="1655" font-size="12">Flow Control</text>

        </svg>
    </div>
</body>

</html>
